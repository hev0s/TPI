<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DuckyVolt - Panneau d'Administration</title>
    <style>
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #e5e3df 0%, #f8f9fa 100%);
            display: flex;
            justify-content: center;
            padding: 20px;
            margin: 0;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .container {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 24px;
            padding: 30px;
            width: 100%;
            max-width: 800px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            box-sizing: border-box;
        }

        h2 { color: #202124; display: flex; align-items: center; gap: 10px; margin-top:0;}
        h3 { border-bottom: 1px solid rgba(218, 220, 224, 0.6); padding-bottom: 10px; color: #3c4043; }

        .btn-secondary {
            background: rgba(241, 243, 244, 0.8);
            color: #3c4043;
            padding: 10px 15px;
            border: 1px solid rgba(218, 220, 224, 0.6);
            border-radius: 12px;
            cursor: pointer;
            margin-bottom: 20px;
            font-weight: 600;
        }

        .btn-primary { background: #1a73e8; color: white; padding: 12px 20px; border: none; border-radius: 12px; cursor: pointer; font-weight: 600;}
        .btn-danger { background: #ea4335; color: white; padding: 6px 12px; border: none; border-radius: 8px; cursor: pointer;}
        .btn-edit { background: #f9ab00; color: white; padding: 6px 12px; border: none; border-radius: 8px; cursor: pointer;}

        input {
            width: 100%; padding: 12px; margin-bottom: 15px;
            border: 1px solid rgba(218, 220, 224, 0.6); border-radius: 12px;
            box-sizing: border-box; font-size: 15px;
        }

        .car-list {
            max-height: 400px; overflow-y: auto; margin-bottom: 20px;
            background: rgba(248, 249, 250, 0.5); border-radius: 12px; padding: 10px;
        }
        .car-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px; border-bottom: 1px solid rgba(218, 220, 224, 0.6);
        }
        .car-item:last-child { border-bottom: none; }

        .form-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
        }
    </style>
</head>
<body style="display: none;" id="main-body">

<script>
    const API_URL = "https://tpi-5ter.onrender.com"; // Modifiez selon votre env
    const token = localStorage.getItem('token');

    // 1. VÉRIFICATION STRICTE DES DROITS AU CHARGEMENT DE LA PAGE
    if (!token) {
        window.location.replace('index.html');
    } else {
        fetch(`${API_URL}/api/admin/verify`, {
            headers: { 'Authorization': `Bearer ${token}` }
        }).then(res => {
            if (res.ok) {
                document.getElementById('main-body').style.display = 'block';
                loadAllCars();
            } else {
                alert("Accès refusé. Vous n'êtes pas administrateur.");
                window.location.replace('home.html');
            }
        });
    }
</script>

<div class="container">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <button class="btn-secondary" style="margin-bottom: 0;" onclick="window.location.href='settings.html'">⬅ Quitter l'admin</button>
        <h2 style="margin: 0;">🛠️ Panneau Admin</h2>
    </div>

    <div class="car-list" id="admin-cars-list">
        <p>Chargement des véhicules...</p>
    </div>

    <h3 id="form-title">Ajouter un nouveau véhicule</h3>
    <div class="form-grid">
        <input type="hidden" id="car-id">
        <input type="text" id="car-brand" placeholder="Marque (ex: Tesla)" required>
        <input type="text" id="car-model" placeholder="Modèle (ex: Model 3)" required>
        <input type="number" step="0.1" id="car-battery" placeholder="Capacité Batterie (kWh) (ex: 75.0)">
        <input type="number" step="0.1" id="car-conso" placeholder="Conso de base (kWh/100km)">
        <input type="number" step="0.01" id="car-cx" placeholder="Aérodynamisme (Cx) (ex: 0.23)">
    </div>
    <div style="margin-top: 10px; display:flex; gap:10px;">
        <button class="btn-primary" onclick="saveVehicle()">Enregistrer</button>
        <button class="btn-secondary" style="margin-bottom:0;" onclick="resetForm()">Annuler</button>
    </div>
    <p id="admin-msg"></p>
</div>

<script>
    async function loadAllCars() {
        const list = document.getElementById('admin-cars-list');
        try {
            // On réutilise la route publique pour lister tous les véhicules
            const res = await fetch(`${API_URL}/api/vehicules/all`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const cars = await res.json();
            list.innerHTML = '';
            cars.forEach(car => {
                list.innerHTML += `
                    <div class="car-item">
                        <div><strong>${car.brand}</strong> ${car.model}</div>
                        <div>
                            <button class="btn-edit" onclick="editVehicle(${car.id})">Modifier</button>
                            <button class="btn-danger" onclick="deleteVehicle(${car.id})">Supprimer</button>
                        </div>
                    </div>
                `;
            });
        } catch (err) {
            list.innerHTML = '<p style="color:red">Erreur de chargement</p>';
        }
    }

    async function editVehicle(id) {
        try {
            const res = await fetch(`${API_URL}/api/admin/vehicules/${id}`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            if(res.ok) {
                const car = await res.json();
                document.getElementById('form-title').innerText = "Modifier le véhicule";
                document.getElementById('car-id').value = id;
                document.getElementById('car-brand').value = car.brand;
                document.getElementById('car-model').value = car.model;
                document.getElementById('car-battery').value = car.battery_capacity;
                document.getElementById('car-conso').value = car.base_consumption;
                document.getElementById('car-cx').value = car.air_drag;
            }
        } catch(err) { alert("Erreur lors de la récupération des données."); }
    }

    async function saveVehicle() {
        const id = document.getElementById('car-id').value;
        const payload = {
            brand: document.getElementById('car-brand').value,
            model: document.getElementById('car-model').value,
            battery_capacity: document.getElementById('car-battery').value || null,
            base_consumption: document.getElementById('car-conso').value || null,
            air_drag: document.getElementById('car-cx').value || null
        };

        const method = id ? 'PUT' : 'POST';
        const url = id ? `${API_URL}/api/admin/vehicules/${id}` : `${API_URL}/api/admin/vehicules`;

        try {
            const res = await fetch(url, {
                method: method,
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify(payload)
            });

            if(res.ok) {
                document.getElementById('admin-msg').style.color = "green";
                document.getElementById('admin-msg').innerText = "Sauvegardé avec succès !";
                resetForm();
                loadAllCars();
            } else {
                throw new Error("Erreur");
            }
        } catch(err) {
            document.getElementById('admin-msg').style.color = "red";
            document.getElementById('admin-msg').innerText = "Erreur lors de la sauvegarde.";
        }
    }

    async function deleteVehicle(id) {
        if(!confirm("Êtes-vous sûr de vouloir supprimer ce véhicule du catalogue ?")) return;
        try {
            const res = await fetch(`${API_URL}/api/admin/vehicules/${id}`, {
                method: 'DELETE',
                headers: { 'Authorization': `Bearer ${token}` }
            });
            if(res.ok) {
                loadAllCars();
            } else {
                alert("Erreur: Le véhicule est probablement encore utilisé par un utilisateur.");
            }
        } catch(err) { alert("Erreur réseau"); }
    }

    function resetForm() {
        document.getElementById('form-title').innerText = "Ajouter un nouveau véhicule";
        document.getElementById('car-id').value = '';
        document.getElementById('car-brand').value = '';
        document.getElementById('car-model').value = '';
        document.getElementById('car-battery').value = '';
        document.getElementById('car-conso').value = '';
        document.getElementById('car-cx').value = '';
    }
</script>
</body>
</html>
